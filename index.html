<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Fantasy Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏏 IPL 2026 Fantasy League 🏆</h1>
        <p>Track your matches, scores, and prizes live!</p>
    </header>

    <section id="leaderboard">
        <h2>🔥 Overall Leaderboard</h2>
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Total Points</th>
                    <th>Prizes Won</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Dynamically filled -->
            </tbody>
        </table>
    </section>

    <section id="match-scores">
        <h2>💸 Match-wise Highest Scorer ($5 prize)</h2>
        <ul id="match-list">
            <!-- Dynamically filled -->
        </ul>
    </section>

    <section id="player-prizes">
        <h2>🎯 Player-based Prizes</h2>
        <ul id="player-prizes-list">
            <!-- Dynamically filled -->
        </ul>
    </section>

    <footer>
        <p>Created for IPL 2026 Fantasy League | Keep it competitive & fun!</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
